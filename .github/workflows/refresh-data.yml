name: Refresh cinema data

on:
  schedule:
    - cron: '17 6 * * *'
      timezone: 'Europe/Paris'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 requests lxml

      - name: Run data builder
        run: |
          python scripts/build_latest.py

      - name: Commit updated JSON if changed
        run: |
          if git diff --quiet data/latest.json; then
            echo "No changes detected in data/latest.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/latest.json
          git commit -m "Auto-refresh cinema data"
          git push
