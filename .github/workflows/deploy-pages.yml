name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'public/**'
      - 'data/latest.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          rm -rf site
          mkdir -p site/data
          cp -R public/* site/
          cp data/latest.json site/data/latest.json

          # Adapter le chemin JSON pour la version déployée sur Pages
          sed -i "s#../data/latest.json#./data/latest.json#g" site/app.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
